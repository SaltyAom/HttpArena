quarkus.http.port=8080
quarkus.log.level=WARN
quarkus.banner.enabled=false

# Use the main HTTP server for gRPC (h2c on port 8080)
quarkus.grpc.server.use-separate-server=false
quarkus.grpc.server.port=8080

# TLS on port 8443
quarkus.http.ssl-port=8443
quarkus.http.tls-configuration-name=grpc-tls
quarkus.tls.grpc-tls.key-store.pem.0.cert=/certs/server.crt
quarkus.tls.grpc-tls.key-store.pem.0.key=/certs/server.key

# Performance tuning
quarkus.http.accept-backlog=-1
quarkus.http.idle-timeout=0
quarkus.vertx.prefer-native-transport=true
